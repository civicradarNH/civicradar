<style>
  .location-dot {
    width: 12px;
    height: 12px;
    background: #4f46e5;
    border-radius: 50%;
    position: relative;
  }

  .location-dot::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: rgba(79, 70, 229, 0.3);
    animation: radar-scan 2s infinite ease-out;
  }

  @keyframes radar-scan {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(3); opacity: 0; }
  }
</style>

<!-- This is what you drop onto your map -->
<div class="location-dot"></div>
