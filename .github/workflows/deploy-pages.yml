# Deploy CivicRadar static site to GitHub Pages (app files only — no ffmpeg/video dev assets).
# After first push: GitHub repo → Settings → Pages → Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip E2E (emergency deploy only — e.g. legal page hotfix)'
        required: false
        default: false
        type: boolean
      full_tests:
        description: 'Run full E2E suite (~20–30 min). Default is smoke (~5 min).'
        required: false
        default: false
        type: boolean

env:
  PLAYWRIGHT_VERSION: '1.49.0'

permissions:
  contents: read
  pages: write
  id-token: write

# cancel-in-progress: true — new pushes supersede queued runs; smoke E2E is ~5 min so
# overlapping deploys are safe and avoids 30-min backlog stacks from the old full suite.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_tests) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-py312-playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ hashFiles('tests/e2e_comprehensive.py') }}
          restore-keys: |
            pip-py312-playwright-${{ env.PLAYWRIGHT_VERSION }}-
            pip-py312-playwright-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ env.PLAYWRIGHT_VERSION }}-chromium-${{ runner.os }}
          restore-keys: ms-playwright-${{ env.PLAYWRIGHT_VERSION }}-chromium-

      - name: Install Playwright
        run: |
          pip install playwright==${{ env.PLAYWRIGHT_VERSION }}
          playwright install chromium --with-deps

      # Server + E2E must share one step: background jobs do not survive step boundaries on GHA.
      - name: Run E2E suite
        run: |
          python -m http.server 8095 --bind 127.0.0.1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8095/ && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8095/ || (echo "Server failed to start" && exit 1)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_tests }}" = "true" ]; then
            echo "Running full E2E suite (workflow_dispatch + full_tests)"
            python tests/e2e_comprehensive.py
          else
            echo "Running smoke E2E subset (push to main or default dispatch)"
            python tests/e2e_comprehensive.py --smoke
          fi

  deploy:
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          cp index.html privacy.html terms.html child-safety-standards.html manifest.json sw.js robots.txt _site/
          cp -r css js assets _site/
          test -f _site/child-safety-standards.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
